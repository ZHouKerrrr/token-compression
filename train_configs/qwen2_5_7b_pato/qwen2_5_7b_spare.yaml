####  Model arguments  ####
model_name_or_path: Qwen/Qwen2.5-VL-7B-Instruct
train_dataset: dataset_configs/gqa_rand.yaml
torch_dtype: bfloat16
teacher_config: 
  enable: True
  teacher_model_name_or_path: Qwen/Qwen2.5-VL-7B-Instruct
resume_from_prev: False
model_args:
  compressor:
    enable: True
    mode: "compressor"
    prune_depth_ratio:
     - 0          # target rate: 0.5
    #  - 0.25       # target rate: 0.3
    #  - 0.5      # target rate: 0.1
# token_sort_mode: Optional["dynamic_token_sorter", "prune_merge_token_sorter"]


####  Training arguments  ####

# loss arguments

lambda_loss:
  lambda_kd_logits: 2.0
  lambda_mse_feature: 0.05
  lambda_distortion: 0.0005
  # lambda_compact: 1e-3
  # lambda_tv: 1e-3
  lambda_rate: 0.01              # (1e-3)
  lambda_rate_start: 0.0001
  temperature_kd: 1.5
  temperature_mse: 2.0
  target_rate: 0.5

# default training arguments
gradient_checkpointing: true
output_dir: output/qwen2_5_7b_spare
bf16: true
fp16: false
report_to: none
attn_implementation: flash_attention_2
# attn_implementation: pato
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 1e-4
num_train_epochs: 1
lr_scheduler_type: cosine
warmup_ratio: 0.1
remove_unused_columns: false
logging_steps: 10
save_steps: 500

# Scripts Args
state_dict_path: output/qwen2_5_7b_spare/spare_components.pt