# Model arguments
model_name_or_path: Qwen/Qwen2.5-VL-7B-Instruct
train_dataset: dataset_configs/gqa_rand.yaml
torch_dtype: bfloat16

teacher_model: 
  enable: True
  teacher_model_name_or_path: Qwen/Qwen2.5-VL-7B-Instruct
projector:
  enable: false
g_raw:
  enable: false
token_sort:
  enable: true
  token_sort_mode: "dynamic_token_sorter"
  attn_layers: 2
# token_sort_mode: Optional["dynamic_token_sorter", "prune_merge_token_sorter"]


####  Training arguments  ####
# loss arguments
lambda_kd_logits: 0.5
lambda_kd_feature: 0.5
lambda_distortion: 0.01   # 0.1
lambda_compact: 0.01
lambda_tv: 0.01
lambda_rate: 0.4          # (1e-3)
# target_rate: 0.25
temperature_kd_logits: 2.0
temperature_kd_feature: 2.0
# default training arguments

gradient_checkpointing: true
output_dir: output/qwen2_5_7b_pato
bf16: true
fp16: false
report_to: none
attn_implementation: flash_attention_2
# attn_implementation: pato
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 1e-4
num_train_epochs: 1
lr_scheduler_type: cosine
warmup_ratio: 0.1
remove_unused_columns: false
logging_steps: 10
save_steps: 500