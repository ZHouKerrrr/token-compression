# Model arguments
model_name_or_path: Qwen/Qwen2.5-VL-7B-Instruct
train_dataset: dataset_configs/gqa_rand.yaml
torch_dtype: bfloat16
teacher_config: 
  enable: True
  teacher_model_name_or_path: Qwen/Qwen2.5-VL-7B-Instruct
clip_config:
  enable: True
  clip_model_name_or_path: ../CLIP_MODEL/clip-vit-large-patch14-336
pato_args:
  projector:
    enable: false
  g_raw:
    enable: false
  token_sort:
    enable: true
    mode: "prune_merge_token_sorter"
    attn_layers: 2
    anchor_idxs: 
     - 0
     - 1
     - 3
    #  - 15
    #  - 17
# token_sort_mode: Optional["dynamic_token_sorter", "prune_merge_token_sorter"]


####  Training arguments  ####

# loss arguments

lambda_loss:
  lambda_kd_logits: 0.75
  lambda_mse_feature: 1.0
  lambda_distortion: 0.01
  # lambda_compact: 1e-3
  # lambda_tv: 1e-3
  lambda_rate: 0.25               # (1e-3)
  lambda_rate_start: 0.01
  temperature_kd: 1.0
  temperature_mse: 2.0

# default training arguments
gradient_checkpointing: true
output_dir: output/qwen2_5_7b_pato_clip
bf16: true
fp16: false
report_to: none
attn_implementation: flash_attention_2
# attn_implementation: pato
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 1e-4
num_train_epochs: 1
lr_scheduler_type: cosine
warmup_ratio: 0.1
remove_unused_columns: false
logging_steps: 10
save_steps: 500

# Scripts Args
pato_state_dict_path: output/qwen2_5_7b_pato_clip/pato_components.pt